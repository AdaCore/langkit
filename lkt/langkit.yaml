lkt_spec:
  entry_point: nodes.lkt
  source_dirs: [.]
library:
  language_name: Lkt
  short_name: lkt
  standalone: true
  defaults:
    unit_provider: Liblktlang.Default_Provider.Create_Lkt
    unparsing_config: default_unparsing_config.lkt
mains:
  source_dirs: [extensions/mains]
  main_programs: [lkt_toolbox]
plugin_passes:
  - prelude.generate_prelude_pass
language_server:
  file_extensions: [".lkt"]
vscode_ext:
  name: lkt
  display_name: Lkt
  description: Extension for the Lkt language
  publisher: adacore
extra_docs:
  liblktlang.create_default_provider: |
    Create a default unit provider that is going to use the environment
    variable associated to the provided language mode to fetch sources. Note
    that the current working directory is implicitly looked at first.

  liblktlang.create_default_provider_from_directories: |
    Return a unit provider that will look for units in the given list of
    directories. Note that the current directory is implicitly looked at first.
